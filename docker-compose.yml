version: "3.9"

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG:-latest}
    container_name: eduportal-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      REVALIDATION_SECRET: ${REVALIDATION_SECRET}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: eduportal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites-available:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - frontend
    networks:
      - web

  certbot:
    image: certbot/certbot:latest
    container_name: eduportal-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

networks:
  web:
    driver: bridge

volumes:
  certbot-webroot:
