name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

jobs:
  # ── Quality Gate ────────────────────────────────────────────────────────────
  ci:
    name: Lint · Type Check · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test -- --passWithNoTests

  # ── Deploy ──────────────────────────────────────────────────────────────────
  # Vercel auto-deploys from GitHub push via GitHub integration.
  # No extra deployment step is needed here.
  # The ci job acts as a quality gate before Vercel proceeds.
