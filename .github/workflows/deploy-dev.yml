name: Deploy — Dev

# Triggers on every push to any branch except main
on:
  push:
    branches-ignore:
      - main

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true   # Cancel older runs for the same branch

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/eduportal-frontend

jobs:
  deploy:
    name: Build & Deploy (Dev)
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Quality checks ───────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      # ── Build Docker image ───────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=development
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.APP_URL }}
            NEXT_PUBLIC_APP_NAME=${{ vars.APP_NAME }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            REVALIDATION_SECRET=${{ secrets.REVALIDATION_SECRET }}

      # ── Deploy to Oracle Cloud VM ────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.OCI_VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              "${{ secrets.OCI_VM_USER }}@${{ secrets.OCI_VM_HOST }}" \
              GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
              GHCR_USER="${{ github.actor }}" \
              IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}" \
              REVALIDATION_SECRET="${{ secrets.REVALIDATION_SECRET }}" \
              'bash -s' << '"EOF"'
            set -euo pipefail

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "⬇️  Pulling $IMAGE"
            docker pull "$IMAGE"

            docker stop eduportal-frontend 2>/dev/null || true
            docker rm   eduportal-frontend 2>/dev/null || true

            docker run -d \
              --name eduportal-frontend \
              --restart unless-stopped \
              --network host \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e REVALIDATION_SECRET="$REVALIDATION_SECRET" \
              "$IMAGE"

            # Health check
            for i in $(seq 1 8); do
              if wget -qO- http://localhost:3000/api/health >/dev/null 2>&1; then
                echo "✅ Health OK"
                break
              fi
              [ $i -eq 8 ] && { echo "❌ Health check failed"; exit 1; }
              echo "  Waiting... ($i/8)"
              sleep 5
            done

            docker image prune -f --filter "until=24h"
            echo "✅ Dev deployment done"
          EOF

      - name: Summary
        if: always()
        run: |
          echo "### Dev Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ vars.APP_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
